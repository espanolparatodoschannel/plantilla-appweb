<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO: Título estático descriptivo -->
    <title>Guía A1: Presentarse en Español | Español Para Todos</title>
    <meta name="description"
        content="Fichas interactivas para aprender español A1: aprende a saludar, identificarte y deletrear tu nombre. Ideal para principiantes.">

    <!-- Open Graph / Redes Sociales -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Guía A1: Presentarse en Español | Español Para Todos">
    <meta property="og:description" content="Aprende a presentarte, saludar y deletrear en español nivel A1 con esta guía interactiva.">
    <!-- URL absoluta a GitHub para que funcione en WhatsApp/RRSS antes de tener dominio propio -->
    <meta property="og:image" content="https://raw.githubusercontent.com/espanolparatodoschannel/plantilla-appweb/main/assets/img/Logo%20Espa%C3%B1ol%20para%20todos_transp.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Guía A1: Presentarse en Español | Español Para Todos">
    <meta name="twitter:description" content="Aprende a presentarte, saludar y deletrear en español nivel A1 con esta guía interactiva.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/espanolparatodoschannel/plantilla-appweb/main/assets/img/Logo%20Espa%C3%B1ol%20para%20todos_transp.png">

    <!-- Schema.org: Datos estructurados para Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Course",
      "name": "Guía A1: Describir Personas en Español",
      "description": "Fichas interactivas para aprender a describir personas en español nivel A1.",
      "provider": {
        "@type": "Organization",
        "name": "Español Para Todos",
        "sameAs": "https://www.youtube.com/@Espanolparatodos-channel"
      },
      "educationalLevel": "A1",
      "inLanguage": "es"
    }
    </script>

    <!-- Google Fonts: preconnect para carga eficiente (sin @import bloqueante) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkPage: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/img/Logo Español para todos_transp.png">
</head>

<body class="text-slate-800 dark:text-slate-200 bg-[var(--bg-page)] dark:bg-darkPage transition-colors duration-300">

    <!-- Header / Hero -->
    <header class="header-mesh text-white pt-4 pb-8 md:pt-6 md:pb-12 shadow-2xl relative overflow-hidden">

        <div class="max-w-6xl mx-auto px-4 md:px-8 relative z-10 flex flex-col items-center">

            <!-- ══ FILA ÚNICA: Logo a la izq | Selector a la der ══ -->
            <div class="w-full flex items-start justify-between gap-x-2 mb-8 md:mb-12">

                <!-- Logo -->
                <img src="assets/img/Logo Español para todos_transp.png" alt="Español Para Todos — Logo del canal"
                    class="h-16 md:h-24 brightness-110 drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] flex-shrink-0 object-contain">

                <!-- Selector de Idiomas Unificado -->
                <div class="flex flex-col items-end gap-1.5 flex-shrink-0 mt-2 md:mt-4 relative">
                    <nav aria-label="Idioma de la interfaz">
                        <div class="h-10 md:h-12 bg-white/10 backdrop-blur-md border border-white/10 rounded-full px-1.5 flex items-center gap-1 md:gap-1.5 shadow-lg"
                            role="group" aria-label="Selecciona tu idioma">
                            <button
                                class="lang-btn active w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all hover:bg-white/20"
                                data-lang="es" aria-label="Español" aria-pressed="true">
                                <img src="https://flagcdn.com/w40/es.png" alt="" aria-hidden="true"
                                    class="w-5 h-5 md:w-6 md:h-6 rounded-full object-cover shadow-sm border border-white/20">
                            </button>
                            <button
                                class="lang-btn w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all hover:bg-white/20"
                                data-lang="en" aria-label="English" aria-pressed="false">
                                <img src="https://flagcdn.com/w40/gb.png" alt="" aria-hidden="true"
                                    class="w-5 h-5 md:w-6 md:h-6 rounded-full object-cover shadow-sm border border-white/20">
                            </button>
                            <button
                                class="lang-btn w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all hover:bg-white/20"
                                data-lang="fr" aria-label="Français" aria-pressed="false">
                                <img src="https://flagcdn.com/w40/fr.png" alt="" aria-hidden="true"
                                    class="w-5 h-5 md:w-6 md:h-6 rounded-full object-cover shadow-sm border border-white/20">
                            </button>
                            <button
                                class="lang-btn w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all hover:bg-white/20"
                                data-lang="pt" aria-label="Português" aria-pressed="false">
                                <img src="https://flagcdn.com/w40/br.png" alt="" aria-hidden="true"
                                    class="w-5 h-5 md:w-6 md:h-6 rounded-full object-cover shadow-sm border border-white/20">
                            </button>
                            <button
                                class="lang-btn w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center transition-all hover:bg-white/20"
                                data-lang="de" aria-label="Deutsch" aria-pressed="false">
                                <img src="https://flagcdn.com/w40/de.png" alt="" aria-hidden="true"
                                    class="w-5 h-5 md:w-6 md:h-6 rounded-full object-cover shadow-sm border border-white/20">
                            </button>
                        </div>
                    </nav>
                    <!-- Hint: Posición absoluta para evitar saltos de layout cuando el texto es largo (ej. Alemán) -->
                    <div class="h-4 w-full relative">
                        <p id="touch-hint" class="touch-hint text-[10px] md:text-xs text-white/90 font-bold absolute right-0 top-0 whitespace-nowrap flex items-center gap-1.5" aria-live="polite"></p>
                    </div>
                </div>
            </div>

            <!-- Contenido Central -->
            <div class="text-center max-w-4xl">
                <h1 id="hero-title" class="text-4xl sm:text-5xl md:text-6xl font-black mb-8 leading-tight"></h1>
                <p
                    class="text-lg md:text-xl opacity-90 max-w-3xl mx-auto leading-relaxed flex flex-col md:flex-row items-center justify-center gap-3">
                    <span id="objetivo"></span>
                </p>
            </div>
        </div>
    </header>

    <!-- Grid de fichas (generado por main.js) -->
    <main class="max-w-7xl mx-auto px-4 py-12 md:py-20">


        <!-- Barra de progreso de fichas -->
        <div id="progress-wrap" class="hidden mb-6">
            <p id="progress-label" class="progress-label"></p>
            <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
                id="progress-bar-aria">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div id="fichasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 items-stretch">
            <!-- Las fichas se generan automáticamente desde contenido.json -->
        </div>

        <!-- Nueva Sección: Diálogo de Lectura -->
        <section id="dialogoSection"
            class="mt-16 bg-white/30 dark:bg-slate-900/30 backdrop-blur-xl rounded-[3rem] p-8 md:p-12 border border-white/20 shadow-2xl hidden opacity-0 transition-all duration-1000 translate-y-8">
            <!-- El contenido se genera dinámicamente desde main.js -->
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 pt-10 pb-8 mt-12">
        <div class="max-w-4xl mx-auto px-6 flex flex-col items-center text-center gap-4">
            <div class="mb-2">
                <!-- Sincronizado con meta.titulo_pagina via JS -->
                <p id="footer-titulo" class="text-white font-bold text-lg leading-tight"></p>
                <p id="footer-slogan" class="text-slate-400 text-base mt-1">
                    Aprende español de forma natural y progresiva.
                </p>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 items-center justify-center w-full">
                <!-- Enlace al video: rel="noopener" por seguridad -->
                <a id="video-link" href="#" target="_blank" rel="noopener noreferrer"
                    class="inline-flex items-center justify-center gap-3 bg-white/5 hover:bg-white/10 backdrop-blur-md px-5 h-11 rounded-xl font-bold text-xs transition-all border border-white/10 group w-full sm:w-auto">
                    <i class="fab fa-youtube text-xl text-white opacity-80 group-hover:opacity-100 transition-opacity"
                        aria-hidden="true"></i>
                    <span id="video-label" class="text-white">Cargando...</span>
                </a>

                <a href="https://www.youtube.com/@Espanolparatodos-channel" target="_blank" rel="noopener noreferrer"
                    class="inline-flex items-center justify-center gap-3 bg-red-600/90 hover:bg-red-700 text-white px-5 h-11 rounded-xl font-bold text-xs transition-all shadow-lg w-full sm:w-auto group">
                    <i class="fab fa-youtube text-xl opacity-80 group-hover:opacity-100 transition-opacity"
                        aria-hidden="true"></i>
                    <span id="footer-btn-text">Visita nuestro canal</span>
                </a>
            </div>

            <div class="w-full border-t border-white/5 pt-4 mt-2">
                <p class="text-xs" style="opacity:0.5;">&copy; 2025 Español Para Todos Channel</p>
            </div>
        </div>
    </footer>

    <!-- Botón Scroll to Top -->
    <button id="scrollTopBtn" aria-label="Volver arriba">
        <i class="fas fa-arrow-up" aria-hidden="true"></i>
    </button>

    <!-- Toast de notificaciones (reemplaza alert()) -->
    <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="js/main.js"></script>
</body>

</html>
